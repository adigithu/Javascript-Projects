<script> //XML request which is also called AJAX request 
    const requestURL='https://api.github.com/users/hiteshchoudhary'

    const xhr=new XMLHttpRequest(); ////Making a new object
    xhr.open('GET', requestURL)
    xhr.onreadystatechange=function(){ //It takes a function and it performs some action if a state is changed
        //This function would be executed when the state would change
        console.log(xhr.readyState)
        if (xhr.readyState===4){
            const data=JSON.parse(this.responseText)  //parse converts string into JSON and now the data type of data would be object
            // console.log(this.responseText) //This refers to the current context and we would get the response text from the requested api
            // console.log(typeof data)  //String    (Whenever we get a response from an URL, we get it in the form of a string)
            console.log(data.followers)
        }
    }
    //Open sends the request and it has two parameters: Method and string
    // GET: The structural HTTP verb used strictly to fetch data from the server.
    xhr.send(); //Then only the open() would be called and the request will be sent

    //V8 engine is written in C++. And it gives some API access and debugging tools
    //Console.log is available in V8 engine

2. AJAX

AJAX = Asynchronous JavaScript and XML

It allows a webpage to communicate with a server without refreshing the page.

Example:

Instagram loads new posts without reloading.
Gmail fetches new emails automatically.

Modern applications often use JSON instead of XML.

This example is one of the most important pieces of JavaScript for understanding AJAX, APIs, asynchronous programming, events, JSON, objects, and HTTP requests.

In simple words:

The browser sends a GET request to the GitHub API asking for user information.
The GitHub API returns the data in JSON format, which is received as a string in responseText.
JSON.parse() converts that JSON string into a JavaScript object so that its properties can be accessed.
data.followers retrieves the followers count from the object, and console.log() displays it in the browser console.

Flow:
