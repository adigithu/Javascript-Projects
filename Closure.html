 <!-- A closure is the combination of a function bundled together (enclosed) with references to its surrounding state (the lexical environment).
In other words, a closure gives you access to an outer function's scope from an inner function. 
In JavaScript, closures are created every time a function is created, at function creation time. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Closure</title>
</head>
<body style="background-color: #313131;">
  <button id="orange">Orange</button>
  <button id="green">Green</button>
</body>
  <script>
        function init() {
          let name = "Mozilla"; // name is a local variable created by init
          function displayName() {
            // displayName() is the inner function, that forms a closure
            console.log(name); //Mozilla  // use variable declared in the parent function
          }
          displayName();
        }
        init();
      /*init() creates a local variable called name and a function called displayName(). The displayName() function is an inner function
      that is defined inside init() and is available only within the body of the init() function. Note that the displayName() function has
      no local variables of its own. However, since inner functions have access to the variables of outer scopes, displayName()
      can access the variable name declared in the parent function, init().
      */

    //Closure

        function makeFunc() {
            const name = "Mozilla";
            function displayName() {
                console.log(name);
            }
            return displayName; //Here we are returning the reference of the function
        }


        const myFunc = makeFunc(); //Here, both not only the inner function would be returned but also the lexical scope would be returned
        myFunc();
  </script>
  <script>
    function clickHandler(color){
      // document.body.style.backgroundColor=`${color}`
      return function(){
        document.body.style.backgroundColor=`${color}`
      }
    }
    document.getElementById('orange').onclick=clickHandler("orange")

  </script>
</html>
